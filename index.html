<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clínica Odontológica Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary:      #0077AA;
    --primary-deep: #004F7A;
    --primary-glow: #00A8D8;
    --bg:           #005A8F;
    --bg-mid:       #0073B2;
    --off-white:    #E0F7FF;
    --cream:        #66D4FF;
    --parchment:    #3DBAFF;
    --baby-blue:    #3DBAFF;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body:    'Jost', sans-serif;
    --ease-out:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --ease-in-out:  cubic-bezier(0.4, 0, 0.2, 1);
    --logo-size:    132px;
    --logo-half:    66px;
    --arc-depth:    20px;
    --arc-top-offset: 46px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--off-white);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  .hero-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 60% 20%, rgba(61, 186, 255, 0.30) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 10% 80%, rgba(0, 150, 200, 0.38) 0%, transparent 55%),
      linear-gradient(175deg, #1A4F70 0%, #005A8F 35%, #0073B2 65%, #1A4F70 100%);
  }

  /* ─── HOME SCREEN ─── */
  #homeScreen {
    position: relative; z-index: 1;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    padding: 0 20px;
    max-width: 520px; margin: 0 auto;
    transition: opacity 280ms var(--ease-in-out), transform 280ms var(--ease-in-out);
  }
  #homeScreen.exiting {
    opacity: 0; transform: translateY(-18px); pointer-events: none;
  }

  /* ─── BOOKING SCREEN ─── */
  #bookingScreen {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column;
    background: linear-gradient(170deg, #1A4F70 0%, #005A8F 40%, #1A4F70 100%);
    transform: translateY(100%);
    transition: transform 400ms var(--ease-out);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  #bookingScreen.visible {
    transform: translateY(0);
  }

  .booking-topbar {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(180deg, #1A4F70 0%, rgba(26,74,112,0.96) 80%, rgba(26,74,112,0) 100%);
    padding: 16px 20px 20px;
    display: flex; align-items: center; gap: 14px;
    backdrop-filter: blur(8px);
  }
  .back-btn {
    display: flex; align-items: center; gap: 10px;
    background: rgba(253,243,234,0.12);
    border: 1.5px solid rgba(253,243,234,0.30);
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer; color: #FFFFFF;
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    letter-spacing: 0.05em;
    transition: background 180ms, border-color 180ms, transform 80ms;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;
  }
  .back-btn:active { transform: scale(0.96); }
  .back-btn:hover {
    background: rgba(253,243,234,0.20);
    border-color: rgba(253,243,234,0.55);
  }
  .back-btn svg { flex-shrink: 0; }
  .booking-topbar-title {
    font-family: var(--font-display);
    font-size: 20px; font-weight: 600; font-style: italic;
    color: var(--off-white); flex: 1;
  }

  .booking-body {
    padding: 4px 20px 40px;
    max-width: 520px; margin: 0 auto; width: 100%;
  }

  .booking-header {
    padding: 8px 0 20px;
    border-bottom: 1px solid rgba(0,119,170,0.25);
    margin-bottom: 24px;
  }
  .booking-title {
    font-family: var(--font-display); font-size: 32px; font-weight: 300;
    font-style: italic; color: var(--off-white); line-height: 1.15;
  }
  .booking-title strong {
    font-style: normal; font-weight: 600; display: block; font-size: 36px;
  }
  .booking-for {
    font-family: var(--font-body); font-size: 11px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(224,247,255,0.90); margin-top: 8px;
  }

  /* ─── COVER ─── */
  .cover-section {
    position: relative;
    height: 205px;
    margin-left: -20px; margin-right: -20px;
    flex-shrink: 0;
    clip-path: url(#coverClip);
    overflow: hidden;
  }
  .cover-section-img {
    position: absolute; inset: 0;
    background-image: url('https://images.unsplash.com/photo-1604654894610-df63bc536371?w=1200&q=80');
    background-size: cover; background-position: center center; opacity: 0.82;
  }
  .cover-section-vignette {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(26,79,112,0.18) 0%, rgba(20,60,90,0.08) 40%, rgba(13,48,80,0.52) 100%);
    pointer-events: none;
  }

  .profile-junction {
    position: relative; height: var(--logo-size);
    margin-top: calc(-1 * var(--logo-half)); flex-shrink: 0; z-index: 2;
  }
  .bridge-svg {
    position: absolute; top: var(--arc-top-offset); left: -20px;
    width: calc(100% + 40px); height: var(--arc-depth); display: block; overflow: visible;
  }
  .bridge-base { fill: none; stroke: rgba(0,119,170,0.45); stroke-width: 0.9; vector-effect: non-scaling-stroke; }
  .bridge-shine-l, .bridge-shine-r {
    fill: none; stroke: rgba(0,168,216,0.82); stroke-width: 1.5; stroke-linecap: round;
    stroke-dasharray: 28 300; stroke-dashoffset: 328; vector-effect: non-scaling-stroke;
  }
  .bridge-shine-l { animation: bridge-shimmer 5s ease-in-out infinite; }
  .bridge-shine-r { animation: bridge-shimmer 5s ease-in-out infinite; }
  @keyframes bridge-shimmer {
    0%,5%   { stroke-dashoffset: 328; opacity: 0; }
    11%     { opacity: 1; }
    64%     { opacity: 0.86; stroke-dashoffset: -28; }
    74%,100%{ stroke-dashoffset: -28; opacity: 0; }
  }
  .profile-logo-circle {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: var(--logo-size); height: var(--logo-size); border-radius: 50%;
    background: radial-gradient(circle at 38% 34%, #005A8F 0%, #1A4F70 52%, #0D3050 100%);
    border: 2.5px solid rgba(0,119,170,0.65);
    box-shadow: 0 0 0 1.5px rgba(13,48,80,0.92), 0 8px 36px rgba(8,24,40,0.72), 0 0 32px rgba(0,119,170,0.16), inset 0 1px 0 rgba(253,243,234,0.12), inset 0 -1px 0 rgba(5,18,32,0.30);
    display: flex; align-items: center; justify-content: center; z-index: 3;
  }
  .profile-logo-circle::after {
    content: ''; position: absolute; inset: -1px; border-radius: 50%;
    background: radial-gradient(circle at 38% 22%, rgba(253,243,234,0.13) 0%, transparent 58%);
    pointer-events: none;
  }

  .profile-identity-text { text-align: center; padding: 18px 0 0; margin-bottom: 6px; flex-shrink: 0; }
  .profile-studio-name {
    font-family: var(--font-display); font-size: 28px; font-weight: 600;
    font-style: italic; color: var(--off-white); letter-spacing: 0.04em; line-height: 1; margin-bottom: 9px;
  }
  .profile-tagline {
    font-family: var(--font-body); font-size: 14px; font-weight: 400;
    line-height: 1.65; color: #FFFFFF; letter-spacing: 0.02em;
  }
  .profile-tagline em { font-style: normal; color: var(--off-white); font-weight: 500; }

  /* ─── DIVIDER ─── */
  .section-divider { display: flex; align-items: center; gap: 14px; margin: 28px 0; }
  .divider-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(0,119,170,0.6), rgba(26,79,112,0.2));
    position: relative; overflow: hidden;
  }
  .divider-diamond {
    width: 5px; height: 5px; background: var(--primary-glow);
    transform: rotate(45deg); opacity: 0.7; flex-shrink: 0;
    animation: diamond-pulse 5s ease-in-out infinite;
  }
  .section-divider > .divider-line:nth-child(1)::after {
    content: ''; position: absolute; top: 0; left: 0; width: 42%; height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(0,168,216,0.55) 45%, rgba(61,186,255,0.75) 50%, rgba(0,168,216,0.55) 55%, transparent 100%);
    animation: shine-to-right 5s ease-in-out infinite;
  }
  .section-divider > .divider-line:nth-child(3)::after {
    content: ''; position: absolute; top: 0; right: 0; left: auto; width: 42%; height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(0,168,216,0.55) 45%, rgba(61,186,255,0.75) 50%, rgba(0,168,216,0.55) 55%, transparent 100%);
    animation: shine-to-left 5s ease-in-out infinite;
  }
  @keyframes shine-to-right {
    0%        { transform: translateX(-140%); opacity: 0; }
    8%        { opacity: 1; }
    62%       { opacity: 0.85; transform: translateX(260%); }
    70%, 100% { transform: translateX(260%); opacity: 0; }
  }
  @keyframes shine-to-left {
    0%        { transform: translateX(140%); opacity: 0; }
    8%        { opacity: 1; }
    62%       { opacity: 0.85; transform: translateX(-260%); }
    70%, 100% { transform: translateX(-260%); opacity: 0; }
  }
  @keyframes diamond-pulse {
    0%,52%  { opacity: 0.7; transform: rotate(45deg) scale(1); }
    65%     { opacity: 1; transform: rotate(45deg) scale(1.45); filter: brightness(1.5); }
    78%     { opacity: 0.88; transform: rotate(45deg) scale(1.10); filter: brightness(1.15); }
    92%,100%{ opacity: 0.7; transform: rotate(45deg) scale(1); filter: brightness(1); }
  }

  /* ─── PROFESSIONALS ─── */
  .professionals { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
  .pro-btn {
    position: relative; display: flex; align-items: center; gap: 16px;
    padding: 0 20px 0 0;
    background: linear-gradient(180deg, #00A8D8 0%, #0077AA 52%, #004F7A 100%);
    border: 1px solid rgba(253,243,234,0.32); border-radius: 4px;
    cursor: pointer; overflow: hidden; text-decoration: none; height: 72px;
    transition: transform 80ms var(--ease-out), box-shadow 120ms var(--ease-out);
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 2px 18px rgba(0,119,170,0.40), inset 0 1px 0 rgba(253,243,234,0.18);
  }
  .pro-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(253,243,234,0.22) 0%, rgba(224,247,255,0.08) 38%, transparent 68%);
    opacity: 0.75; transition: opacity 380ms var(--ease-out); pointer-events: none;
  }
  .pro-btn::after {
    content: ''; position: absolute; top: 0; left: -90%; width: 55%; height: 100%;
    background: linear-gradient(102deg, transparent 0%, rgba(253,243,234,0.10) 30%, rgba(253,243,234,0.24) 50%, rgba(253,243,234,0.10) 70%, transparent 100%);
    transform: skewX(-10deg); animation: gold-shimmer 7s cubic-bezier(0.4,0,0.6,1) infinite;
    opacity: 0.70; transition: opacity 400ms var(--ease-out); pointer-events: none;
  }
  .pro-btn:hover::before { opacity: 1; }
  .pro-btn:hover::after  { opacity: 1; animation-duration: 4.5s; }
  .pro-btn:hover         { border-color: rgba(253,243,234,0.54); }
  .pro-btn:active { transform: scale(0.976); box-shadow: 0 1px 8px rgba(0,79,122,0.24), inset 0 2px 6px rgba(0,79,122,0.15); }
  .pro-btn .glow-ring {
    position: absolute; inset: -2px; border-radius: 6px;
    border: 1.5px solid rgba(61,186,255,0.0); box-shadow: 0 0 0 0 rgba(0,119,170,0);
    transition: border-color 350ms var(--ease-out), box-shadow 350ms var(--ease-out); pointer-events: none;
  }
  .pro-btn:hover .glow-ring { border-color: rgba(61,186,255,0.34); box-shadow: 0 0 18px rgba(0,119,170,0.24); }
  .pro-avatar-placeholder {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, rgba(61,186,255,0.18), rgba(0,115,178,0.30));
    border: 1.5px solid rgba(224,247,255,0.30);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 4px;
  }
  .pro-avatar-placeholder span { font-family: var(--font-display); font-size: 20px; font-weight: 400; color: rgba(253,243,234,0.88); font-style: italic; }
  .pro-info { flex: 1; text-align: left; }
  .pro-role { font-family: var(--font-body); font-size: 9.5px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: #FFFFFF; margin-bottom: 3px; }
  .pro-name { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: #FFFFFF; letter-spacing: 0.01em; line-height: 1; margin-bottom: 3px; }
  .pro-action { font-family: var(--font-body); font-size: 11px; font-weight: 500; color: #FFFFFF; letter-spacing: 0.04em; }
  .pro-arrow { flex-shrink: 0; opacity: 0.55; transition: opacity 200ms, transform 200ms; }
  .pro-btn:hover .pro-arrow { opacity: 0.90; transform: translateX(2px); }

  .insta-btn {
    position: relative; display: flex; align-items: center; gap: 14px; padding: 0 20px;
    background: linear-gradient(135deg, #833AB4 0%, #C13584 45%, #E1306C 75%, #F77737 100%);
    border: none; border-radius: 4px; cursor: pointer; overflow: hidden;
    text-decoration: none; height: 56px; width: 100%;
    transition: transform 80ms var(--ease-out); -webkit-tap-highlight-color: transparent;
    box-shadow: 0 2px 16px rgba(193,53,132,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
    margin-bottom: 16px;
  }
  .insta-btn::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 120% 120% at 50% -20%, rgba(255,255,255,0.12) 0%, transparent 60%);
    opacity: 0; transition: opacity 300ms var(--ease-out);
  }
  .insta-btn:active { transform: scale(0.976); }
  .insta-btn:hover::before { opacity: 1; }
  .insta-btn .insta-btn-glow {
    position: absolute; inset: -2px; border-radius: 6px; border: 1.5px solid rgba(255,160,200,0.0);
    transition: border-color 350ms var(--ease-out), box-shadow 350ms var(--ease-out); pointer-events: none;
  }
  .insta-btn:hover .insta-btn-glow { border-color: rgba(255,160,200,0.22); box-shadow: 0 0 18px rgba(193,53,132,0.2); }
  .insta-label { flex: 1; text-align: left; }
  .insta-role { font-family: var(--font-body); font-size: 9.5px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,240,250,0.80); margin-bottom: 2px; }
  .insta-name { font-family: var(--font-body); font-size: 14px; font-weight: 500; color: rgba(255,240,250,0.95); letter-spacing: 0.06em; }

  footer { padding: 16px 0 28px; display: flex; align-items: center; justify-content: space-between; opacity: 0.38; }
  .footer-text { font-size: 9px; font-weight: 400; letter-spacing: 0.16em; text-transform: uppercase; color: var(--parchment); }
  .footer-ornament { display: flex; gap: 4px; align-items: center; }
  .footer-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--primary-glow); }

  /* ─── STEP CONTAINER (CHANGE 3: clean per-step) ─── */
  .step-container {
    display: none;
    opacity: 0;
    transform: translateX(20px);
    transition: opacity 300ms var(--ease-out), transform 300ms var(--ease-out);
  }
  .step-container.active {
    display: block;
  }
  .step-container.visible {
    opacity: 1;
    transform: translateX(0);
  }

  /* ─── CHANGE 1+2: TYPING EFFECT + PREMIUM TYPOGRAPHY ─── */
  .chat-message {
    margin-bottom: 24px;
  }

  /* CHANGE 2: Professional, clinical, premium question typography */
  .chat-question {
    font-family: 'Jost', sans-serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.50;
    color: #FFFFFF;
    margin-bottom: 20px;
    letter-spacing: 0.01em;
    text-transform: none;
  }

  /* CHANGE 1: Typing container — hides content until typed */
  .typing-wrapper {
    position: relative;
    margin-bottom: 20px;
    min-height: 24px;
  }

  .typing-text {
    font-family: 'Jost', sans-serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.50;
    color: #FFFFFF;
    letter-spacing: 0.01em;
    display: inline;
  }

  /* Blinking cursor during typing */
  .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--primary-glow);
    margin-left: 2px;
    vertical-align: middle;
    animation: cursor-blink 0.75s step-end infinite;
  }

  .typing-cursor.done {
    display: none;
  }

  @keyframes cursor-blink {
    from, to { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* Interaction area fades in only after typing ends */
  .step-interaction {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 320ms var(--ease-out), transform 320ms var(--ease-out);
    pointer-events: none;
  }
  .step-interaction.revealed {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .chat-input-wrapper {
    margin-bottom: 16px;
  }

  /* ─── FORM ELEMENTS ─── */
  .form-section { margin-bottom: 20px; }
  .form-label {
    display: block; font-family: var(--font-body);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.20em; text-transform: uppercase;
    color: #FFFFFF; margin-bottom: 8px;
  }
  .form-input, .form-textarea {
    width: 100%;
    background: #FFFFFF;
    border: 2px solid rgba(0,115,178,0.50);
    border-radius: 6px;
    padding: 13px 14px;
    font-family: var(--font-body);
    font-size: 15px; font-weight: 500;
    color: #003050;
    outline: none;
    transition: border-color 200ms, box-shadow 200ms;
    -webkit-appearance: none; appearance: none;
    cursor: pointer;
  }
  .form-input::placeholder, .form-textarea::placeholder {
    color: rgba(0,90,143,0.55);
    font-weight: 400;
  }
  .form-input:focus, .form-textarea:focus {
    border-color: #0077AA;
    box-shadow: 0 0 0 3px rgba(0,119,170,0.15);
  }
  .form-textarea {
    resize: none; height: 88px; line-height: 1.55; cursor: text;
  }

  /* ─── OPTION CARDS ─── */
  .option-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .option-card {
    background: rgba(0,115,178,0.12);
    border: 2px solid rgba(224,247,255,0.30);
    border-radius: 8px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 200ms var(--ease-out);
    -webkit-tap-highlight-color: transparent;
    text-align: left;
  }

  .option-card:hover {
    background: rgba(0,115,178,0.22);
    border-color: rgba(224,247,255,0.55);
    transform: translateX(4px);
  }

  .option-card.selected {
    background: #1F9D55;
    border-color: #167A40;
    box-shadow: 0 2px 12px rgba(31,157,85,0.35);
  }

  .option-card-title {
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 700;
    color: #FFFFFF;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }

  .option-card-subtitle {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    line-height: 1.5;
  }

  /* ─── BUTTON GROUPS ─── */
  .button-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .choice-btn {
    padding: 14px 20px;
    background: rgba(0,115,178,0.15);
    border: 2px solid rgba(224,247,255,0.35);
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 600;
    color: #FFFFFF;
    cursor: pointer;
    transition: all 180ms var(--ease-out);
    -webkit-tap-highlight-color: transparent;
    text-align: center;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .choice-btn:hover {
    background: rgba(0,115,178,0.28);
    border-color: rgba(224,247,255,0.65);
  }

  .choice-btn.selected {
    background: #1F9D55;
    border-color: #167A40;
    box-shadow: 0 2px 10px rgba(31,157,85,0.35);
  }

  /* ─── DATE/TIME PICKERS ─── */
  .time-opt-rows { display: flex; flex-direction: column; gap: 12px; }
  .time-opt-row  { display: flex; flex-direction: column; gap: 6px; }
  .time-opt-label {
    font-family: var(--font-body); font-size: 10px; font-weight: 700;
    letter-spacing: 0.20em; text-transform: uppercase; color: #FFFFFF;
  }
  .time-opt-label .req     { color: var(--primary-glow); }
  .time-opt-label .opt-tag { color: rgba(224,247,255,0.60); font-weight: 500; }

  .datetime-row { display: flex; gap: 8px; }
  .datetime-row .date-input { flex: 3; }
  .datetime-row .time-input { flex: 2; }

  .form-input[readonly] { cursor: pointer; user-select: none; }
  .form-input[readonly]:focus { border-color: #0077AA; box-shadow: 0 0 0 3px rgba(0,119,170,0.15); }

  .time-error {
    font-family: var(--font-body); font-size: 12px; font-weight: 600;
    color: #FF5060; margin-top: 6px; min-height: 16px; letter-spacing: 0.01em;
  }
  .form-input.field-error {
    border-color: rgba(220,70,90,0.80) !important;
    box-shadow: 0 0 0 3px rgba(220,70,90,0.12) !important;
  }

  .form-hint {
    font-family: var(--font-body); font-size: 12px; font-weight: 500;
    color: #FFFFFF; line-height: 1.6; margin-bottom: 14px;
  }
  .form-hint .hint-req { color: var(--primary-glow); font-weight: 700; }

  /* ─── NAVIGATION BUTTONS ─── */
  .nav-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 24px;
  }

  .continue-btn, .submit-btn {
    width: 100%; padding: 16px;
    background: linear-gradient(105deg, #004F7A 0%, #0077AA 30%, #00A8D8 52%, #0077AA 72%, #004F7A 100%);
    background-size: 250% 100%; background-position: 100% 0;
    border: 1px solid rgba(253,243,234,0.32); border-radius: 4px;
    font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: #FFFFFF; cursor: pointer;
    transition: transform 120ms var(--ease-out), box-shadow 120ms var(--ease-out), background-position 600ms ease-in-out;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 4px 20px rgba(0,119,170,0.44); -webkit-tap-highlight-color: transparent;
    position: relative; overflow: hidden;
    min-height: 52px;
  }

  .continue-btn::before, .submit-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(253,243,234,0.20) 0%, rgba(224,247,255,0.07) 38%, transparent 68%);
    opacity: 0.75; transition: opacity 300ms var(--ease-out); pointer-events: none;
  }

  .continue-btn::after, .submit-btn::after {
    content: ''; position: absolute; top: 0; left: -90%; width: 55%; height: 100%;
    background: linear-gradient(102deg, transparent 0%, rgba(253,243,234,0.10) 30%, rgba(253,243,234,0.22) 50%, rgba(253,243,234,0.10) 70%, transparent 100%);
    transform: skewX(-10deg); animation: gold-shimmer 7s cubic-bezier(0.4,0,0.6,1) infinite;
    animation-delay: 1.5s; opacity: 0.65; transition: opacity 400ms var(--ease-out); pointer-events: none;
  }

  .continue-btn:active, .submit-btn:active { transform: scale(0.982); }
  .continue-btn:hover, .submit-btn:hover {
    border-color: rgba(253,243,234,0.54);
    box-shadow: 0 4px 24px rgba(0,168,216,0.55);
    background-position: 0% 0;
  }

  .back-step-btn {
    width: 100%;
    padding: 14px;
    background: rgba(0,115,178,0.10);
    border: 1.5px solid rgba(224,247,255,0.25);
    border-radius: 4px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.70);
    cursor: pointer;
    transition: all 150ms var(--ease-out);
    -webkit-tap-highlight-color: transparent;
    min-height: 48px;
  }

  .back-step-btn:hover {
    background: rgba(0,115,178,0.18);
    border-color: rgba(224,247,255,0.45);
    color: #FFFFFF;
  }

  @keyframes gold-shimmer { 0%,22% { left: -90%; } 72%,100% { left: 180%; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .anim    { animation: fadeUp 600ms var(--ease-out) both; }
  .anim-d1 { animation-delay:  60ms; }
  .anim-d2 { animation-delay: 160ms; }
  .anim-d3 { animation-delay: 240ms; }
  .anim-d4 { animation-delay: 330ms; }
  .anim-d5 { animation-delay: 420ms; }

  /* ─── CUSTOM DATE PICKER MODAL ─── */
  .picker-modal {
    position: fixed; inset: 0; z-index: 500;
    display: flex; align-items: flex-end; justify-content: center;
    background: rgba(30,10,3,0);
    pointer-events: none;
    transition: background 250ms var(--ease-in-out);
  }
  .picker-modal.open {
    background: rgba(30,10,3,0.80);
    pointer-events: auto;
  }
  .picker-panel {
    background: linear-gradient(170deg, #1A4F70 0%, #2A6FA0 100%);
    border: 1px solid rgba(0,119,170,0.45);
    border-radius: 16px 16px 0 0;
    padding: 0 0 32px;
    width: 100%; max-width: 520px;
    transform: translateY(100%);
    transition: transform 320ms var(--ease-out);
    box-shadow: 0 -8px 40px rgba(5,15,25,0.70);
    max-height: 80dvh; overflow-y: auto;
  }
  .picker-modal.open .picker-panel { transform: translateY(0); }
  .picker-handle-bar {
    display: flex; justify-content: center; padding: 12px 0 0;
  }
  .picker-handle-bar span {
    width: 36px; height: 3px; background: rgba(0,119,170,0.35); border-radius: 2px; display: block;
  }
  .picker-title {
    font-family: var(--font-body); font-size: 11px; font-weight: 700;
    letter-spacing: 0.20em; text-transform: uppercase;
    color: #FFFFFF; text-align: center; padding: 12px 20px 16px;
    border-bottom: 1px solid rgba(0,119,170,0.20);
    margin-bottom: 0;
  }

  /* Calendar */
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 8px;
  }
  .cal-month-label {
    font-family: var(--font-display); font-size: 20px; font-weight: 600; font-style: italic;
    color: var(--off-white); letter-spacing: 0.03em;
  }
  .cal-nav {
    background: none; border: none; cursor: pointer; color: rgba(224,247,255,0.80);
    padding: 6px; border-radius: 4px; transition: color 150ms, background 150ms;
    display: flex; align-items: center; justify-content: center;
    min-width: 36px; min-height: 36px; -webkit-tap-highlight-color: transparent;
  }
  .cal-nav:hover { color: #FFFFFF; background: rgba(0,119,170,0.18); }
  .cal-grid { padding: 0 12px 8px; }
  .cal-dow-row {
    display: grid; grid-template-columns: repeat(7,1fr);
    margin-bottom: 4px;
  }
  .cal-dow {
    font-family: var(--font-body); font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(224,247,255,0.60); text-align: center; padding: 4px 0;
  }
  .cal-days-row {
    display: grid; grid-template-columns: repeat(7,1fr); gap: 2px;
  }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; font-family: var(--font-body); font-size: 14px; font-weight: 500;
    color: #FFFFFF; cursor: pointer;
    transition: background 150ms, color 150ms;
    -webkit-tap-highlight-color: transparent;
    min-height: 40px;
  }
  .cal-day:hover:not(.cal-day--disabled):not(.cal-day--empty) {
    background: rgba(0,119,170,0.25);
  }
  .cal-day--disabled { color: rgba(224,247,255,0.25); cursor: not-allowed; }
  .cal-day--empty    { pointer-events: none; }
  .cal-day--today    { border: 1.5px solid rgba(0,119,170,0.55); }
  .cal-day--selected {
    background: #0077AA !important;
    color: #FFFFFF !important;
    font-weight: 700;
  }

  /* Time list */
  .time-list {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 12px 16px 4px;
  }
  .time-slot {
    display: flex; align-items: center; justify-content: center;
    padding: 11px 0; border-radius: 6px;
    font-family: var(--font-body); font-size: 14px; font-weight: 500;
    color: #FFFFFF; background: rgba(0,115,178,0.15);
    border: 1.5px solid rgba(224,247,255,0.25);
    cursor: pointer; transition: background 150ms, border-color 150ms;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;
  }
  .time-slot:hover { background: rgba(0,115,178,0.35); border-color: rgba(224,247,255,0.55); }
  .time-slot.selected {
    background: #0077AA; border-color: #00A8D8; color: #FFFFFF; font-weight: 700;
  }

  /* ─── SUMMARY CARD ─── */
  .summary-card {
    background: rgba(0,115,178,0.08);
    border: 1.5px solid rgba(0,119,170,0.30);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .summary-row {
    display: flex;
    padding: 12px 0;
    border-bottom: 1px solid rgba(0,119,170,0.15);
  }

  .summary-row:last-child {
    border-bottom: none;
  }

  .summary-label {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    flex: 0 0 120px;
  }

  .summary-value {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    color: #FFFFFF;
    line-height: 1.6;
    flex: 1;
  }

  @media (max-width: 340px) {
    .datetime-row { flex-direction: column; }
    .datetime-row .date-input, .datetime-row .time-input { flex: none; width: 100%; }
    .time-list { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

<script>
/* ───── CONFIG ───── */
const WHATSAPP = '83991816152';
const proNames = {
  'dra-ana': 'Dra. Ana Paula',
  'dr-carlos': 'Dr. Carlos Eduardo'
};

/* ───── GLOBAL STATE ───── */
let currentPro = 'dra-ana';
let currentStep = 0;
let conversationData = {
  clientName: '',
  isFirstVisit: null,
  patientType: '',
  treatmentType: '',
  treatmentSubtype: '',
  childReason: '',
  additionalInfo: '',
  cpf: '',
  whatsapp: '',
  dates: ['', '', '']
};

/* ───── CHANGE 3: Step-based navigation with history ───── */
// Steps: 0=name, 1=firstVisit, 2=patientType, 3=treatment/childReason, 4=treatmentSub, 5=additionalInfo, 6=cpf, 7=whatsapp, 8=dates, 9=summary
// For child: 3=childReason (no sub), 4=additionalInfo, ...
// Steps are rendered one at a time; going back restores previous step with saved data.

const STEP_NAME       = 0;
const STEP_FIRST      = 1;
const STEP_PATIENT    = 2;
const STEP_TREATMENT  = 3; // treatment categories OR child reason
const STEP_SUBTREAT   = 4; // treatment sub-options (skipped for child)
const STEP_INFO       = 5;
const STEP_CPF        = 6;
const STEP_WHATSAPP   = 7;
const STEP_DATES      = 8;
const STEP_SUMMARY    = 9;

/* ───── TYPING ENGINE ───── */
// Renders text letter by letter, then reveals interaction area
function typeText(element, text, speed, onDone) {
  let i = 0;
  const cursor = element.nextElementSibling; // .typing-cursor
  element.textContent = '';
  if (cursor) cursor.classList.remove('done');

  function tick() {
    if (i < text.length) {
      element.textContent += text[i];
      i++;
      // Slight variation for natural feel
      const delay = speed + (Math.random() * 18 - 9);
      setTimeout(tick, Math.max(8, delay));
    } else {
      if (cursor) cursor.classList.add('done');
      if (onDone) onDone();
    }
  }
  tick();
}

function renderStep(stepId) {
  currentStep = stepId;
  const container = document.getElementById('conversationContainer');

  // CHANGE 3: Clear screen, show new step fresh
  container.innerHTML = '';
  container.scrollTop = 0;

  const wrapper = document.createElement('div');
  wrapper.className = 'chat-message';
  container.appendChild(wrapper);

  buildStep(stepId, wrapper);
}

function buildStep(stepId, wrapper) {
  const data = conversationData;

  switch (stepId) {
    case STEP_NAME:
      renderTypingStep(wrapper,
        'Olá, será um prazer atendê-lo(a). Como posso te chamar?',
        buildNameInteraction
      );
      break;

    case STEP_FIRST:
      renderTypingStep(wrapper,
        `Perfeito, ${data.clientName}. Essa será sua primeira consulta com a gente?`,
        buildFirstVisitInteraction
      );
      break;

    case STEP_PATIENT:
      const greet = data.isFirstVisit
        ? `Seja muito bem-vindo(a) à nossa clínica, ${data.clientName}.`
        : `Seja muito bem-vindo(a) novamente, ${data.clientName}.`;
      renderTypingStep(wrapper,
        `${greet} A consulta será para você, para outro adulto ou para uma criança?`,
        buildPatientTypeInteraction
      );
      break;

    case STEP_TREATMENT:
      if (data.patientType === 'child') {
        renderTypingStep(wrapper,
          'Cuidar dos pequenos exige atenção especial. Qual o motivo da consulta da criança?',
          buildChildReasonInteraction
        );
      } else {
        renderTypingStep(wrapper,
          'Para direcionarmos ao profissional ideal, qual tipo de tratamento você está buscando hoje?',
          buildTreatmentInteraction
        );
      }
      break;

    case STEP_SUBTREAT:
      renderTypingStep(wrapper,
        'Ótimo. Para sermos ainda mais precisos, qual das opções abaixo melhor descreve sua necessidade?',
        buildSubTreatmentInteraction
      );
      break;

    case STEP_INFO:
      renderTypingStep(wrapper,
        'Existe alguma informação importante que você gostaria de nos contar sobre a consulta?',
        buildAdditionalInfoInteraction
      );
      break;

    case STEP_CPF:
      renderTypingStep(wrapper,
        'Para seguirmos com seu cadastro e garantir um atendimento mais ágil, informe o CPF do paciente.',
        buildCPFInteraction
      );
      break;

    case STEP_WHATSAPP:
      renderTypingStep(wrapper,
        'Agora informe o número de WhatsApp para contato e confirmação do atendimento.',
        buildWhatsAppInteraction
      );
      break;

    case STEP_DATES:
      renderTypingStep(wrapper,
        'Perfeito! Informe até 3 opções de datas e horários de sua preferência.',
        buildDatesInteraction
      );
      break;

    case STEP_SUMMARY:
      renderTypingStep(wrapper,
        `Tudo certo, ${data.clientName}! Confira o resumo do seu agendamento antes de confirmar.`,
        buildSummaryInteraction
      );
      break;
  }
}

/* ───── Generic typing step renderer ───── */
function renderTypingStep(wrapper, question, buildInteraction) {
  wrapper.innerHTML = `
    <div class="typing-wrapper">
      <span class="typing-text"></span><span class="typing-cursor"></span>
    </div>
    <div class="step-interaction" id="stepInteraction"></div>
  `;

  const typingEl = wrapper.querySelector('.typing-text');
  const interactionEl = wrapper.querySelector('#stepInteraction');

  // Speed: ~28ms per char for natural reading pace
  typeText(typingEl, question, 28, () => {
    buildInteraction(interactionEl);
    // Reveal interaction after a small pause
    setTimeout(() => {
      interactionEl.classList.add('revealed');
      // Focus first input if any
      const firstInput = interactionEl.querySelector('input, textarea');
      if (firstInput) firstInput.focus();
    }, 160);
  });

/* ───── CHANGE 3: goBack navigation ───── */
function goBack() {
  if (currentStep <= STEP_NAME) {
    closeBooking();
    return;
  }

  // Determine previous step
  let prev = currentStep - 1;

  // If we're at STEP_SUBTREAT and patient is child, skip STEP_SUBTREAT going back
  // (child has no subtreat, so back from INFO goes to TREATMENT directly)
  if (currentStep === STEP_INFO && conversationData.patientType === 'child') {
    prev = STEP_TREATMENT;
  }

  // If we're at STEP_INFO for adult, prev is STEP_SUBTREAT
  // (normal flow, handled by currentStep - 1)

  renderStep(prev);
}

/* ───── DATE PICKER ───── */
let calYear, calMonth, activeDateField;
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DOWS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function openDatePicker(n) {
  activeDateField = n;
  document.getElementById('datePickerTitle').textContent = `${n}ª opção — escolha a data`;
  const now = new Date();
  const existing = document.getElementById('date' + n).value;
  if (existing) {
    const parts = existing.split('/');
    if (parts.length === 3) {
      calYear  = parseInt(parts[2]);
      calMonth = parseInt(parts[1]) - 1;
    } else {
      calYear  = now.getFullYear();
      calMonth = now.getMonth();
    }
  } else {
    calYear  = now.getFullYear();
    calMonth = now.getMonth();
  }
  renderCalendar();
  openModal('datePickerModal');
}

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = MONTHS_PT[calMonth] + ' ' + calYear;

  const dowRow = document.getElementById('calDowRow');
  dowRow.innerHTML = '';
  DOWS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    dowRow.appendChild(el);
  });

  const daysRow = document.getElementById('calDaysRow');
  daysRow.innerHTML = '';

  const firstDay  = new Date(calYear, calMonth, 1).getDay();
  const daysInMo  = new Date(calYear, calMonth + 1, 0).getDate();
  const today     = new Date(); today.setHours(0,0,0,0);

  const curVal = document.getElementById('date' + activeDateField).value;

  for (let i = 0; i < firstDay; i++) {
    const emp = document.createElement('div');
    emp.className = 'cal-day cal-day--empty';
    daysRow.appendChild(emp);
  }

  for (let d = 1; d <= daysInMo; d++) {
    const date = new Date(calYear, calMonth, d);
    date.setHours(0,0,0,0);
    const isSunday   = date.getDay() === 0;
    const isPast     = date < today;
    const disabled   = isSunday || isPast;
    const isToday    = date.getTime() === today.getTime();

    const formatted  = pad(d) + '/' + pad(calMonth+1) + '/' + calYear;
    const isSelected = formatted === curVal;

    const el = document.createElement('div');
    el.className = 'cal-day' +
      (disabled   ? ' cal-day--disabled' : '') +
      (isToday    ? ' cal-day--today'    : '') +
      (isSelected ? ' cal-day--selected' : '');
    el.textContent = d;
    if (!disabled) {
      el.onclick = () => selectDate(d, calMonth, calYear);
    }
    daysRow.appendChild(el);
  }
}

function selectDate(d, m, y) {
  const val = pad(d) + '/' + pad(m+1) + '/' + y;
  document.getElementById('date' + activeDateField).value = val;
  document.getElementById('date' + activeDateField).classList.remove('field-error');
  closeModal('datePickerModal');
}

function calPrev() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}
function calNext() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function openTimePicker(n) {
  activeTimeField = n;
  document.getElementById('timePickerTitle').textContent = `${n}ª opção — escolha o horário`;
  const list = document.getElementById('timeList');
  list.innerHTML = '';
  const curVal = document.getElementById('time' + n).value;

  for (let h = 8; h <= 19; h++) {
    const minutes = h === 19 ? [0] : [0, 30];
    minutes.forEach(m => {
      const label = pad(h) + ':' + pad(m);
      const el = document.createElement('div');
      el.className = 'time-slot' + (curVal === label ? ' selected' : '');
      el.textContent = label;
      el.onclick = () => selectTime(label, n);
      list.appendChild(el);
    });
  }

  openModal('timePickerModal');
}

function selectTime(val, n) {
  document.getElementById('time' + n).value = val;
  document.getElementById('time' + n).classList.remove('field-error');
  closeModal('timePickerModal');
}

/* ───── MODAL HELPERS ───── */
function openModal(id) {
  const m = document.getElementById(id);
  m.style.display = 'flex';
  requestAnimationFrame(() => { requestAnimationFrame(() => { m.classList.add('open'); }); });
}
function closeModal(id) {
  const m = document.getElementById(id);
  m.classList.remove('open');
  setTimeout(() => { m.style.display = ''; }, 320);
}
function handlePickerOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

/* ───── VALIDATE & SEND ───── */
function validateTimes() {
  const err = document.getElementById('timeError');
  ['date1','time1','date2','time2','date3','time3'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('field-error');
  });

  const d1 = document.getElementById('date1').value.trim();
  const t1 = document.getElementById('time1').value.trim();
  const d2 = document.getElementById('date2').value.trim();
  const t2 = document.getElementById('time2').value.trim();
  const d3 = document.getElementById('date3').value.trim();
  const t3 = document.getElementById('time3').value.trim();

  const markErr = (msg, ...ids) => {
    err.textContent = msg;
    ids.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('field-error'); });
    document.getElementById('timeError').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return false;
  };

  if (!d1) return markErr('Selecione a data da 1ª opção.', 'date1');
  if (!t1) return markErr('Selecione o horário da 1ª opção.', 'time1');
  if (d2 && !t2) return markErr('Selecione o horário da 2ª opção.', 'time2');
  if (!d2 && t2) return markErr('Selecione a data da 2ª opção.', 'date2');
  if (d3 && !t3) return markErr('Selecione o horário da 3ª opção.', 'time3');
  if (!d3 && t3) return markErr('Selecione a data da 3ª opção.', 'date3');

  const k1 = d1+t1, k2 = (d2&&t2)?d2+t2:null, k3 = (d3&&t3)?d3+t3:null;
  if (k2 && k1===k2) return markErr('1ª e 2ª opção têm o mesmo horário.','date1','time1','date2','time2');
  if (k3 && k1===k3) return markErr('1ª e 3ª opção têm o mesmo horário.');
  if (k2&&k3 && k2===k3) return markErr('2ª e 3ª opção têm o mesmo horário.');

  err.textContent = '';
  return {
    v1: d1 + ' às ' + t1,
    v2: k2 ? d2 + ' às ' + t2 : null,
    v3: k3 ? d3 + ' às ' + t3 : null
  };
}

function sendWhatsApp() {
  const data = conversationData;
  const proName = proNames[currentPro];

  let serviceText = '';
  if (data.patientType === 'child') {
    const rMap = {
      routine: 'Consulta de rotina/prevenção',
      cavity: 'Cárie ou dor de dente',
      growth: 'Acompanhamento do crescimento dos dentes',
      habits: 'Hábitos orais',
      evaluation: 'Avaliação completa'
    };
    serviceText = rMap[data.childReason] || '';
  } else {
    const tMap = {
      preventive: 'Prevenção e cuidados básicos',
      treatment: 'Tratamento dentário',
      aesthetic: 'Estética do sorriso',
      orthodontics: 'Ortodontia',
      implants: 'Implantes e reabilitação oral',
      evaluation: 'Avaliação completa'
    };
    serviceText = tMap[data.treatmentType] || '';
    if (data.treatmentSubtype) serviceText += ` — ${data.treatmentSubtype}`;
  }

  const ptMap = {
    self: 'para si mesmo(a)',
    adult: 'para outro adulto',
    child: 'para uma criança'
  };

  const isFirstVisitText = data.isFirstVisit ? 'primeira consulta' : 'retorno';

  let msg = `Olá, ${proName}! Gostaria de agendar uma consulta.\n\n`;
  msg += `👤 *Paciente:* ${data.clientName}\n`;
  msg += `📋 *Tipo:* Consulta ${ptMap[data.patientType]} (${isFirstVisitText})\n`;
  if (serviceText) msg += `🦷 *Tratamento:* ${serviceText}\n`;
  if (data.additionalInfo) msg += `📝 *Informações:* ${data.additionalInfo}\n`;
  if (data.cpf) msg += `🆔 *CPF:* ${data.cpf}\n`;
  if (data.whatsapp) msg += `📱 *WhatsApp:* ${data.whatsapp}\n`;

  msg += `\n📅 *Datas de preferência:*\n`;
  msg += `  1ª opção: ${data.dates[0]}\n`;
  if (data.dates[1]) msg += `  2ª opção: ${data.dates[1]}\n`;
  if (data.dates[2]) msg += `  3ª opção: ${data.dates[2]}\n`;

  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
  closeBooking();
}

/* ───── UTILS ───── */
function pad(n) { return String(n).padStart(2, '0'); }

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(str) {
  if (!str) return '';
  return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

/* ───── KEYBOARD ───── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal('datePickerModal');
    closeModal('timePickerModal');
  }
});
</script>
